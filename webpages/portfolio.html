<script src="../assets/shared.js"></script>
<script>
let allData=[];
let currentRange=0;

function formatValue(v){ if(Math.abs(v)>=1) return Number(v).toLocaleString(undefined,{maximumFractionDigits:4}); return Number(v).toPrecision(3);} 
const fmt=v=>{
  if(Math.abs(v)>=1000) return Number(v.toFixed(0)).toLocaleString();
  if(Math.abs(v)>=1)    return v.toFixed(4);
  return formatValue(v);
};
const fmtPct=p=>(p>=0?'+':'')+p.toFixed(2)+'%';
const getSlice=()=>currentRange>0?allData.slice(-currentRange):allData;

function renderStats(){
  if(!allData.length) return;
  const d=getSlice();
  const first=d[0].value,last=d[d.length-1].value;
  const pct=((last-first)/first)*100;
  document.getElementById('statCurrent').textContent=fmt(last);
  document.getElementById('statStart').textContent=fmt(first);
  const sc=document.getElementById('statChange');
  sc.textContent=fmtPct(pct);
  sc.className='stat-val '+(pct>=0?'up':'down');
  document.getElementById('statDays').textContent=allData.length;
}

function drawChart(){
  const canvas=document.getElementById('mainchart');
  const tip=document.getElementById('chartTip');
  const data=getSlice();
  if(!canvas||!data.length) return;

  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth,H=280;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const P={t:16,r:14,b:32,l:14};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const vals=data.map(d=>d.value);
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const toX=i=>P.l+(i/(data.length-1))*cW;
  const toY=v=>P.t+(1-(v-min)/rng)*cH;

  ctx.strokeStyle='rgba(255,255,255,0.035)';ctx.lineWidth=.5;
  [0,.25,.5,.75,1].forEach(t=>{
    const y=P.t+t*cH;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
  });

  const grad=ctx.createLinearGradient(0,P.t,0,P.t+cH);
  grad.addColorStop(0,'rgba(255,255,255,0.16)');
  grad.addColorStop(1,'rgba(255,255,255,0.01)');
  ctx.beginPath();
  data.forEach((d,i)=>{const x=toX(i),y=toY(d.value);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(toX(data.length-1),P.t+cH);ctx.lineTo(P.l,P.t+cH);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();
  data.forEach((d,i)=>{const x=toX(i),y=toY(d.value);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle='#ffffff';ctx.lineWidth=1.8;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  const lx=toX(data.length-1),ly=toY(data[data.length-1].value);
  ctx.beginPath();ctx.arc(lx,ly,3.5,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,6,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();

  ctx.fillStyle='rgba(143,143,143,0.55)';ctx.font=`9px 'Space Mono',monospace`;
  [[0,'left'],[Math.floor((data.length-1)/2),'center'],[data.length-1,'right']].forEach(([i,a])=>{
    ctx.textAlign=a;
    const x=a==='left'?P.l:a==='right'?P.l+cW:toX(i);
    ctx.fillText(data[i].date.slice(0,7),x,H-8);
  });

  canvas._meta={P,cW,cH,data,toX,toY};
  canvas.onmousemove=e=>{
    const{P,cW,data,toX,toY}=canvas._meta;
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    if(mx<P.l||mx>P.l+cW){tip.style.display='none';return;}
    const idx=Math.round((mx-P.l)/cW*(data.length-1));
    const pt=data[Math.max(0,Math.min(idx,data.length-1))];
    const py=toY(pt.value);
    tip.style.display='block';
    tip.innerHTML=`<span style="color:var(--muted)">${pt.date}</span><br><span style="color:var(--accent);font-size:12px;font-weight:700">${fmt(pt.value)}</span>`;
    const pRect=canvas.parentElement.getBoundingClientRect();
    let tx=e.clientX-pRect.left+14;
    if(tx+160>pRect.width) tx=e.clientX-pRect.left-170;
    tip.style.left=tx+'px';
    tip.style.top=(py-18)+'px';
  };
  canvas.onmouseleave=()=>{tip.style.display='none';};
}

function setRange(n){
  currentRange=n;
  document.querySelectorAll('.range-btn').forEach(b=>
    b.classList.toggle('active',parseInt(b.dataset.range)===n)
  );
  renderStats();drawChart();
}

function sanitizeAndLoad(text) {
  const normalized = text
    .replace(/,\s*([}\]])/g, '$1')
    .replace(/"value"\s*:\s*\}/g, '"value":null}')
    .replace(/"value"\s*:\s*$/gm, '"value":null');

  const json = JSON.parse(normalized);
  const raw  = Array.isArray(json) ? json : (json.portfolio || json.data || []);
  return raw.filter(d =>
    d && d.date && d.value !== null && d.value !== undefined && d.value !== '' && !isNaN(Number(d.value))
  ).map(d => ({ date: d.date, value: Number(d.value) }));
}

function onDataLoaded(data) {
  allData = data;
  renderStats();
  drawChart();
  window.addEventListener('resize', drawChart);
}

function showDataError(err) {
  console.warn('portfolio.json:', err);
  ['statCurrent','statStart','statChange','statDays'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  const box = document.querySelector('.chart-box');
  if (box) box.innerHTML = `
    <div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:1px;line-height:2.4">
      NO DATA<br><span style="opacity:.35;font-size:9px">portfolio.json could not be loaded</span>
    </div>`;
}

function loadPortfolioData() {
  const candidates = [
    new URL('../portfolio.json', window.location.href).href,
    new URL('/portfolio.json', window.location.href).href,
    'https://raw.githubusercontent.com/girayeser/girayeser.github.io/main/portfolio.json'
  ];

  const tryFetch = (url) => fetch(url, { cache: 'no-store' }).then(r => r.ok ? r.text() : Promise.reject(new Error(url)));

  return tryFetch(candidates[0])
    .catch(() => tryFetch(candidates[1]))
    .catch(() => tryFetch(candidates[2]))
    .catch(() => Promise.reject(new Error('portfolio data unavailable')));
}

loadPortfolioData()
  .then(text => onDataLoaded(sanitizeAndLoad(text)))
  .catch(showDataError);
</script>
